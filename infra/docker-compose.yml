name: appable

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appable
      POSTGRES_PASSWORD: appable
      POSTGRES_DB: appable
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appable"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
